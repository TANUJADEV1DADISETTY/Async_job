version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: async_jobs
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d async_jobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    command: npm run start:api
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/async_jobs
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cron-worker:
    build: .
    command: npm run start:cron
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/async_jobs
      - CRON_INTERVAL_MS=10000
    depends_on:
      postgres:
        condition: service_healthy

  queue-worker:
    build: .
    command: npm run start:queue
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/async_jobs
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
